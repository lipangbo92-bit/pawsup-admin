<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawsUp 爪哇宠屋 - 管理登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">🐾</div>
                <h1 class="title">PawsUp 爪哇宠屋</h1>
                <span class="role-badge">管理员入口</span>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="login-btn">登 录</button>
            </form>
            
            <div id="loginMessage" style="display:none; margin-top:10px; padding:10px; border-radius:4px;"></div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        // 立即执行登录逻辑以确保它能工作
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.querySelector('.login-btn');
            var msg = document.getElementById('loginMessage');
            
            if (!username || !password) {
                msg.style.display = 'block';
                msg.style.backgroundColor = '#fee';
                msg.style.color = '#c00';
                msg.textContent = '请填写用户名和密码';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            
            // 模拟登录延迟
            setTimeout(function() {
                localStorage.setItem('adminLoggedIn', 'true');
                localStorage.setItem('adminUser', username);
                window.location.href = 'dashboard.html';
            }, 500);
        });
    </script>
</body>
</html>
